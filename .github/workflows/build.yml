name: Build and Release

on:
  push:
    branches: [ "master" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: darwin
            goarch: amd64
            archive: zip
          - goos: darwin
            goarch: arm64
            archive: zip

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Build Binaries
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        mkdir -p dist
        CLI_NAME=barcode
        SERVER_NAME=mcp-barcode-server
        if [ "${{ matrix.goos }}" = "windows" ]; then
          CLI_NAME=${CLI_NAME}.exe
          SERVER_NAME=${SERVER_NAME}.exe
        fi
        go build -v -o "dist/${CLI_NAME}" ./cmd/barcode
        go build -v -o "dist/${SERVER_NAME}" ./cmd/mcp-server

    - name: Create Archive
      run: |
        ARCHIVE_NAME=mlc-barcode-${{ matrix.goos }}-${{ matrix.goarch }}
        # Prepare staging area
        mkdir -p staging
        cp dist/* staging/
        cp README.md README.de.md MCP_INTEGRATION.md MCP_INTEGRATION.de.md staging/
        cp -r assets staging/
        
        if [ "${{ matrix.archive }}" = "zip" ]; then
          cd staging && zip -r "../${ARCHIVE_NAME}.zip" .
        else
          cd staging && tar -czvf "../${ARCHIVE_NAME}.tar.gz" .
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mlc-barcode-${{ matrix.goos }}-${{ matrix.goarch }}
        path: mlc-barcode-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
